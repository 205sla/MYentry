<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 · CODE 205</title>
    <meta name="description" content="CODE 205 로그인.">
    <meta name="theme-color" content="#2c313d">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <link href="css/common.css" rel="stylesheet">
    <link href="css/auth.css" rel="stylesheet">
</head>
<body>
    <header>
        <a href="/" class="back-link">← 메인</a>
        <span class="header-title">CODE 205 <span class="beta-badge">BETA</span></span>
    </header>

    <main class="auth-container">
        <h1 class="auth-title">로그인</h1>

        <div id="formError" class="auth-error" hidden></div>

        <form id="loginForm" class="auth-form" novalidate>
            <label class="field">
                <span class="field-label">아이디</span>
                <input type="text" name="username" required autocomplete="username" autofocus>
            </label>

            <label class="field">
                <span class="field-label">비밀번호</span>
                <input type="password" name="password" required autocomplete="current-password">
            </label>

            <button type="submit" class="auth-button" id="submitBtn">로그인</button>
        </form>

        <p class="auth-alt">처음 오셨나요? <a href="/signup.html">가입하기</a></p>
    </main>

    <script src="js/common-footer.js"></script>
    <script src="js/auth-page.js"></script>
</body>
</html>
