<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"
        />
        <title>엔트리 만들기</title>
        <link href="lib/entry-js/dist/entry.min.css" rel="stylesheet" />
        <link href="lib/entry-tool/dist/entry-tool.css" rel="stylesheet" />
        <link href="lib/entry-lms/dist/assets/app.css" rel="stylesheet" />
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { overflow: hidden; }
            #header {
                height: 42px;
                background: #2c313d;
                display: flex;
                align-items: center;
                padding: 0 16px;
                color: #fff;
                font-family: 'NanumGothic', 'Malgun Gothic', sans-serif;
                position: relative;
                z-index: 100;
            }
            #header h1 { font-size: 16px; font-weight: 600; flex: 1; }
            #header button {
                border: none; border-radius: 4px;
                padding: 6px 16px; margin-left: 8px;
                font-size: 13px; cursor: pointer; font-weight: 600;
            }
            #play-btn { background: #4caf50; color: #fff; }
            #play-btn:hover { background: #43a047; }
            #stop-btn { background: #f44336; color: #fff; }
            #stop-btn:hover { background: #e53935; }
            .mode-btn { background: #555; color: #fff; }
            .mode-btn:hover { background: #666; }
            #workspace { height: calc(100vh - 42px); }
            #popup-container {
                position: fixed; top: 0; left: 0;
                width: 100%; height: 100%;
                z-index: 9999; display: none;
            }
        </style>
    </head>

    <body>
        <div id="header">
            <h1>엔트리 만들기</h1>
            <button class="mode-btn" onclick="changeWorkspaceMode('block')">블록</button>
            <button class="mode-btn" onclick="changeWorkspaceMode('python')">파이썬</button>
            <button id="play-btn">&#9654; 시작하기</button>
            <button id="stop-btn">&#9632; 정지하기</button>
        </div>
        <div id="workspace"></div>
        <div id="popup-container"></div>

        <!-- Language -->
        <script src="lib/entry-js/extern/lang/ko.js"></script>

        <!-- CreateJS (CDN) -->
        <script src="https://playentry.org/lib/PreloadJS/lib/preloadjs-0.6.0.min.js"></script>
        <script src="https://playentry.org/lib/EaselJS/lib/easeljs-0.8.0.min.js"></script>
        <script src="https://playentry.org/lib/SoundJS/lib/soundjs-0.6.0.min.js"></script>
        <script src="https://playentry.org/lib/SoundJS/lib/flashaudioplugin-0.6.0.min.js"></script>

        <!-- Core libs (CDN) -->
        <script src="https://playentry.org/lib/lodash/dist/lodash.min.js"></script>
        <script src="https://playentry.org/lib/jquery/jquery.min.js"></script>
        <script src="https://playentry.org/lib/jquery-ui/ui/minified/jquery-ui.min.js"></script>
        <script src="https://playentry.org/lib/velocity/velocity.min.js"></script>

        <!-- CodeMirror (CDN) -->
        <script src="https://playentry.org/lib/codemirror/lib/codemirror.js"></script>
        <script src="https://playentry.org/lib/codemirror/addon/hint/show-hint.js"></script>
        <script src="https://playentry.org/lib/codemirror/addon/lint/lint.js"></script>
        <script src="https://playentry.org/lib/codemirror/addon/selection/active-line.js"></script>
        <script src="https://playentry.org/lib/codemirror/mode/javascript/javascript.js"></script>
        <script src="https://playentry.org/lib/codemirror/addon/hint/javascript-hint.js"></script>
        <script src="https://playentry.org/js/jshint.js"></script>
        <script src="https://playentry.org/lib/fuzzy/lib/fuzzy.js"></script>
        <script src="https://playentry.org/js/ws/python.js"></script>

        <!-- Entry extern utils (local) -->
        <script src="lib/entry-js/extern/util/filbert.js"></script>
        <script src="lib/entry-js/extern/util/CanvasInput.js"></script>
        <script src="lib/entry-js/extern/util/ndgmr.Collision.js"></script>
        <script src="lib/entry-js/extern/util/handle.js"></script>
        <script src="lib/entry-js/extern/util/bignumber.min.js"></script>

        <!-- Socket.io (CDN) -->
        <script src="https://playentry.org/lib/socket.io-client/socket.io.js"></script>

        <!-- React (CDN) -->
        <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

        <!-- Entry LMS (local) -->
        <script src="lib/entry-lms/dist/assets/app.js"></script>

        <!-- Entry static (block definitions) -->
        <script src="lib/entry-js/extern/util/static.js"></script>

        <!-- Entry tools -->
        <script src="lib/entry-tool/dist/entry-tool.js"></script>
        <script src="lib/entry-paint/dist/static/js/entry-paint.js"></script>
        <script src="lib/sound-editor/sound-editor.js"></script>
        <script src="lib/legacy-video/index.js"></script>

        <!-- Entry main bundle -->
        <script src="lib/entry-js/dist/entry.min.js"></script>

        <!-- Workspace mode switch (from original example.ejs) -->
        <script>
            function changeWorkspaceMode(mode) {
                var option = {};
                if (mode === 'block') {
                    option.boardType = Entry.Workspace.MODE_BOARD;
                    option.textType = -1;
                } else {
                    option.boardType = Entry.Workspace.MODE_VIMBOARD;
                    option.textType = Entry.Vim.TEXT_TYPE_PY;
                    option.runType = Entry.Vim.WORKSPACE_MODE;
                }
                var workspace = Entry.getMainWS();
                if (workspace) {
                    workspace.setMode(option);
                }
            }

            document.getElementById('play-btn').addEventListener('click', function () {
                if (typeof Entry !== 'undefined' && Entry.engine) {
                    Entry.engine.toggleRun();
                }
            });
            document.getElementById('stop-btn').addEventListener('click', function () {
                if (typeof Entry !== 'undefined' && Entry.engine) {
                    Entry.engine.toggleStop();
                }
            });
        </script>

        <!-- Initialize Entry -->
        <script>
            window.PUBLIC_PATH_FOR_ENTRYJS = 'lib/entry-js/dist/';
            $(document).ready(function () {
                var problemId = new URLSearchParams(location.search).get('problem');
                var initOption = {
                    libDir: 'lib/entry-js',
                    entryDir: '',
                    type: 'workspace',
                    textCodingEnable: true,
                };
                Entry.creationChangedEvent = new Entry.Event(window);
                Entry.init(document.getElementById('workspace'), initOption);

                if (problemId) {
                    fetch('/api/problems/' + problemId)
                        .then(function (r) { if (r.ok) return r.json(); throw r; })
                        .then(function (project) { Entry.loadProject(project); })
                        .catch(function () { Entry.loadProject(); });
                } else {
                    Entry.loadProject();
                }
                initEntryPopup();
            });

            function initEntryPopup() {
                var container = document.getElementById('popup-container');
                var popup = new EntryTool.Popup({
                    container: container,
                    isShow: false,
                    theme: 'entry',
                    data: { data: { data: [] } }
                });

                var currentType = '';

                Entry.addEventListener('openSpriteManager', function () {
                    currentType = 'sprite';
                    container.style.display = 'block';
                    popup.show({ type: 'sprite' });
                });
                Entry.addEventListener('openPictureManager', function () {
                    currentType = 'picture';
                    container.style.display = 'block';
                    popup.show({ type: 'picture' });
                });
                Entry.addEventListener('openSoundManager', function () {
                    currentType = 'sound';
                    container.style.display = 'block';
                    popup.show({ type: 'sound' });
                });

                popup.on('submit', function (items) {
                    if (!items || !items.length) return;
                    var sceneId = Entry.scene.selectedScene.id;

                    if (currentType === 'sprite') {
                        items.forEach(function (item) {
                            var pics = (item.pictures || []).map(function (p) {
                                p.id = p.id || Entry.generateHash();
                                p.fileurl = p.fileurl || p.thumbUrl || '';
                                p.thumbUrl = p.thumbUrl || p.fileurl || '';
                                p.filename = p.filename || '_';
                                return p;
                            });
                            var snds = (item.sounds || []).map(function (s) {
                                s.id = s.id || Entry.generateHash();
                                s.fileurl = s.fileurl || '';
                                s.filename = s.filename || '_';
                                return s;
                            });
                            var firstPic = pics[0] || { dimension: { width: 100, height: 100 } };
                            var w = firstPic.dimension ? firstPic.dimension.width : 100;
                            var h = firstPic.dimension ? firstPic.dimension.height : 100;
                            Entry.container.addObject({
                                id: Entry.generateHash(),
                                name: item.name || 'Object',
                                objectType: 'sprite',
                                rotateMethod: 'free',
                                scene: sceneId,
                                sprite: { pictures: pics, sounds: snds },
                                entity: { x: 0, y: 0, regX: w / 2, regY: h / 2, scaleX: 1, scaleY: 1, rotation: 0, direction: 90, width: w, height: h, visible: true }
                            }, 0);
                        });
                    } else if (currentType === 'picture') {
                        items.forEach(function (pic) {
                            pic.id = Entry.generateHash();
                            pic.fileurl = pic.fileurl || pic.thumbUrl || '';
                            pic.thumbUrl = pic.thumbUrl || pic.fileurl || '';
                            pic.filename = pic.filename || '_';
                            Entry.playground.addPicture(pic, true);
                        });
                    } else if (currentType === 'sound') {
                        items.forEach(function (snd) {
                            snd.id = Entry.generateHash();
                            snd.fileurl = snd.fileurl || '';
                            snd.filename = snd.filename || '_';
                            Entry.playground.addSound(snd, true);
                        });
                        if (Entry.Utils && Entry.Utils.forceStopSounds) {
                            Entry.Utils.forceStopSounds();
                        }
                    }
                    container.style.display = 'none';
                    currentType = '';
                });

                popup.on('close', function () {
                    container.style.display = 'none';
                    currentType = '';
                });

                popup.on('uploads', function (data) {
                    if (!data || !data.uploads) return;
                    var files = data.uploads;
                    var sceneId = Entry.scene.selectedScene.id;
                    files.forEach(function (file) {
                        var reader = new FileReader();
                        reader.onload = function (e) {
                            var dataUrl = e.target.result;
                            var name = file.name.replace(/\.[^.]+$/, '');
                            if (currentType === 'sound') {
                                var audio = new Audio(dataUrl);
                                audio.onloadedmetadata = function () {
                                    Entry.playground.addSound({ id: Entry.generateHash(), name: name, fileurl: dataUrl, duration: audio.duration, ext: '.mp3', filename: '_' }, true);
                                };
                                audio.onerror = function () {
                                    Entry.playground.addSound({ id: Entry.generateHash(), name: name, fileurl: dataUrl, duration: 1, ext: '.mp3', filename: '_' }, true);
                                };
                            } else {
                                var img = new Image();
                                img.onload = function () {
                                    var ext = file.name.split('.').pop().toLowerCase();
                                    var pic = { id: Entry.generateHash(), name: name, fileurl: dataUrl, thumbUrl: dataUrl, imageType: ext === 'svg' ? 'svg' : 'png', dimension: { width: img.width, height: img.height }, filename: '_' };
                                    if (currentType === 'sprite') {
                                        Entry.container.addObject({ id: Entry.generateHash(), name: name, objectType: 'sprite', rotateMethod: 'free', scene: sceneId, sprite: { pictures: [pic], sounds: [] }, entity: { x: 0, y: 0, regX: img.width / 2, regY: img.height / 2, scaleX: 1, scaleY: 1, rotation: 0, direction: 90, width: img.width, height: img.height, visible: true } }, 0);
                                    } else {
                                        Entry.playground.addPicture(pic, true);
                                    }
                                };
                                img.src = dataUrl;
                            }
                        };
                        reader.readAsDataURL(file);
                    });
                    container.style.display = 'none';
                    currentType = '';
                });

                popup.on('draw', function () {
                    container.style.display = 'none';
                    if (typeof EntryPaint !== 'undefined' && Entry.playground) {
                        var pic = { id: Entry.generateHash(), name: Lang.Workspace.new_picture || '새 그림', fileurl: '', thumbUrl: '', imageType: 'png', dimension: { width: 480, height: 270 }, filename: '_' };
                        if (currentType === 'sprite') {
                            Entry.container.addObject({ id: Entry.generateHash(), name: pic.name, objectType: 'sprite', rotateMethod: 'free', scene: Entry.scene.selectedScene.id, sprite: { pictures: [pic], sounds: [] }, entity: { x: 0, y: 0, regX: 240, regY: 135, scaleX: 1, scaleY: 1, rotation: 0, direction: 90, width: 480, height: 270, visible: true } }, 0);
                        } else {
                            Entry.playground.addPicture(pic, true);
                        }
                    }
                    currentType = '';
                });

                popup.on('write', function (data) {
                    container.style.display = 'none';
                    currentType = '';
                });
            }
        </script>
    </body>
</html>
