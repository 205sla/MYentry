<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"
        />
        <title>에디터 · CODE 205 (Beta)</title>
        <meta name="description" content="CODE 205 블록 코딩 에디터. 블록을 조립해서 알고리즘 문제를 풀고 자동 채점으로 검증하세요.">
        <meta name="theme-color" content="#2c313d" />
        <link rel="canonical" href="https://code.205.kr/editor.html" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link href="lib/entry-js/dist/entry.min.css" rel="stylesheet" />
        <link href="lib/entry-tool/dist/entry-tool.css" rel="stylesheet" />
        <link href="lib/entry-lms/dist/assets/app.css" rel="stylesheet" />
        <link href="css/editor.css" rel="stylesheet" />
    </head>

    <body>
        <div id="header">
            <h1>CODE 205<span class="beta-badge">BETA</span></h1>
            <button class="mode-btn" onclick="changeWorkspaceMode('block')">블록</button>
            <button class="mode-btn" onclick="changeWorkspaceMode('python')">파이썬</button>
            <button id="undo-btn" class="history-btn" disabled title="실행취소 (Ctrl+Z)">&#8617; 실행취소</button>
            <button id="redo-btn" class="history-btn" disabled title="다시실행 (Ctrl+Shift+Z)">&#8618; 다시실행</button>
            <button id="reset-btn" title="프로젝트를 초기 상태로 되돌립니다">&#8635; 초기화</button>
            <button id="export-btn" title="현재 작품을 .ent 파일로 저장 (엔트리 사이트에서 불러올 수 있습니다)">&#8681; 내 컴퓨터에 저장하기</button>
            <button id="test-btn" style="display:none;" title="공개 테스트 케이스로 확인">&#128269; 테스트하기</button>
            <button id="submit-btn" style="display:none;">&#10004; 제출하기</button>
        </div>
        <div id="confirm-overlay">
            <div id="confirm-dialog">
                <p id="confirm-message">정말 초기화하시겠습니까?</p>
                <div class="confirm-btns">
                    <button id="confirm-yes">초기화</button>
                    <button id="confirm-no">취소</button>
                </div>
            </div>
        </div>
        <div id="grade-overlay">
            <div id="grade-modal">
                <div id="grade-header">
                    <div id="grade-title">채점 결과</div>
                </div>
                <div id="grade-body"></div>
                <div id="grade-footer" class="running">
                    <button id="grade-stop" type="button">&#9209; 채점 중단</button>
                    <button id="grade-close-btn" type="button">닫기</button>
                    <button id="grade-home" type="button">&#127968; 문제 선택으로</button>
                </div>
            </div>
        </div>
        <div id="main">
            <div id="problem-panel">
                <div id="problem-panel-header">
                    <h2 id="problem-panel-title">문제</h2>
                </div>
                <div id="problem-panel-body">문제를 불러오는 중...</div>
            </div>
            <div id="splitter"></div>
            <div id="workspace-wrapper">
                <div id="workspace"></div>
            </div>
        </div>
        <div id="popup-container"></div>

        <!-- Language -->
        <script src="lib/entry-js/extern/lang/ko.js"></script>

        <!-- CreateJS (CDN) -->
        <script src="https://playentry.org/lib/PreloadJS/lib/preloadjs-0.6.0.min.js"></script>
        <script src="https://playentry.org/lib/EaselJS/lib/easeljs-0.8.0.min.js"></script>
        <script src="https://playentry.org/lib/SoundJS/lib/soundjs-0.6.0.min.js"></script>
        <script src="https://playentry.org/lib/SoundJS/lib/flashaudioplugin-0.6.0.min.js"></script>

        <!-- Core libs (CDN) -->
        <script src="https://playentry.org/lib/lodash/dist/lodash.min.js"></script>
        <script src="https://playentry.org/lib/jquery/jquery.min.js"></script>
        <script src="https://playentry.org/lib/jquery-ui/ui/minified/jquery-ui.min.js"></script>
        <script src="https://playentry.org/lib/velocity/velocity.min.js"></script>

        <!-- CodeMirror (CDN) -->
        <script src="https://playentry.org/lib/codemirror/lib/codemirror.js"></script>
        <script src="https://playentry.org/lib/codemirror/addon/hint/show-hint.js"></script>
        <script src="https://playentry.org/lib/codemirror/addon/lint/lint.js"></script>
        <script src="https://playentry.org/lib/codemirror/addon/selection/active-line.js"></script>
        <script src="https://playentry.org/lib/codemirror/mode/javascript/javascript.js"></script>
        <script src="https://playentry.org/lib/codemirror/addon/hint/javascript-hint.js"></script>
        <script src="https://playentry.org/js/jshint.js"></script>
        <script src="https://playentry.org/lib/fuzzy/lib/fuzzy.js"></script>
        <script src="https://playentry.org/js/ws/python.js"></script>

        <!-- Entry extern utils (local) -->
        <script src="lib/entry-js/extern/util/filbert.js"></script>
        <script src="lib/entry-js/extern/util/CanvasInput.js"></script>
        <script src="lib/entry-js/extern/util/ndgmr.Collision.js"></script>
        <script src="lib/entry-js/extern/util/handle.js"></script>
        <script src="lib/entry-js/extern/util/bignumber.min.js"></script>

        <!-- Socket.io (CDN) -->
        <script src="https://playentry.org/lib/socket.io-client/socket.io.js"></script>

        <!-- React (CDN) -->
        <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

        <!-- Entry LMS (local) -->
        <script src="lib/entry-lms/dist/assets/app.js"></script>

        <!-- Entry static (block definitions) -->
        <script src="lib/entry-js/extern/util/static.js"></script>

        <!-- Entry tools -->
        <script src="lib/entry-tool/dist/entry-tool.js"></script>
        <script src="lib/entry-paint/dist/static/js/entry-paint.js"></script>
        <script src="lib/sound-editor/sound-editor.js"></script>
        <script src="lib/legacy-video/index.js"></script>

        <!-- Entry main bundle -->
        <script src="lib/entry-js/dist/entry.min.js"></script>

        <!-- App code (must load AFTER all Entry libs).
             editor-pure.js defines pure helpers used by editor.js and is unit-tested
             via `npm test` — must be loaded first since editor.js references them. -->
        <script src="js/editor-pure.js"></script>
        <script src="js/editor.js"></script>
    </body>
</html>
