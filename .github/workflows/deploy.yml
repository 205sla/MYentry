name: Deploy to code.205.kr

on:
  push:
    branches: [main]
  workflow_dispatch: # 수동 트리거 가능

concurrency:
  group: deploy-production
  cancel-in-progress: false

# 2026-09 이후 GitHub Actions의 JavaScript 액션 기본 런타임이 Node.js 24로 전환됩니다.
# 현재 사용 중인 v4 액션들은 Node 20 기반이라 deprecation 경고가 나오는데, 이 플래그로
# 즉시 Node 24에서 실행하도록 강제해 경고를 제거하고 향후 호환성까지 확보합니다.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Run tests
        run: npm test

  deploy:
    name: SSH deploy
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          command_timeout: 3m
          script: |
            set -e
            cd ~/CODE-205
            echo "== git pull =="
            git pull --ff-only origin main
            echo "== npm install (if needed) =="
            npm install --omit=dev --no-audit --no-fund
            echo "== pm2 startOrReload =="
            # ecosystem.config.js로 진입점·env를 선언해 관리.
            # 기존에 'pm2 start server.js'로 등록된 경우 한 번 delete해서 최신 script 경로로 재등록.
            pm2 describe entry >/dev/null 2>&1 && pm2 delete entry || true
            pm2 start ecosystem.config.js --update-env
            pm2 save
            echo "== health check =="
            sleep 2
            curl -sf -o /dev/null -w "HTTP %{http_code}\n" http://127.0.0.1:3000/
            echo "== deploy complete =="
